<svg width="240" height="80" viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap');
      .text { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icono del Cerdito -->
  <rect x="10" y="15" width="50" height="50" rx="12" fill="#FF007F" filter="url(#shadow)" />
  <path d="M44.5 35.5c0-4.694-3.806-8.5-8.5-8.5s-8.5 3.806-8.5 8.5 3.806 8.5 8.5 8.5 8.5-3.806 8.5-8.5zm-3.5 0c0 .276-.224.5-.5.5h-2v2c0 .276-.224.5-.5.5h-5c-.276 0-.5-.224-.5-.5v-2h-2c-.276 0-.5-.224-.5-.5v-5c0-.276.224-.5.5-.5h2v-2c0-.276.224-.5.5-.5h5c.276 0 .5.224.5.5v2h2c.276 0 .5.224.5.5v5z" fill="white" transform="translate(0, 0)"/>
  <circle cx="35" cy="40" r="10" fill="white" opacity="0.2" />
  <path d="M30 38h10v4H30z" fill="white" />

  <!-- Texto Piggybanko -->
  <text x="70" y="52" class="text" font-size="32" letter-spacing="-1">
    <tspan fill="#1A1A40">piggy</tspan><tspan fill="#FF007F">banko</tspan>
  </text>
</svg>